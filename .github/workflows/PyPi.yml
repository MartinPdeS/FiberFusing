name: PyPi Upload

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read


jobs:
  Pure_Upload:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: 'true'

      - name: Set up Python $3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Installing
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt wheel twine


      - name: Building in manylinux
        run: |
          python setup.py bdist_wheel

      - name: Publish a Python distribution to PyPI
        run: |
          twine upload --password ${{ secrets.PYPI_API_TOKEN }} --username __token__ --repository pypi dist/*






