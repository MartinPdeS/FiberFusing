name: Deploy

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  ManyLinux_x86_64:
    uses: MartinPdeS/PyMieSim/.github/workflows/ubuntu.yml@master
    secrets: inherit
    with:
      publish_wheel: true
      python_wheel: "[['3.9', 'cp39']]"
      python_twine: '3.8'
      upload_documentation: true
      python_documentation: "3.9" #no documentation for python 3.7 (pickle5 not present˘)
      update_coverage: true


  job_publish_wheel:
    needs: [Windows_x86_64, macos_x86_64, ManyLinux_x86_64]
    name: "Publish wheel to PyPi"
    runs-on: ubuntu-latest
    steps:

      - name: "Set-up: Python ${{ inputs.python_twine }}"
        uses: actions/setup-python@v4
        with:
          python-version: "${{ inputs.python_twine }}"

      - name: "Install: Dependencies"
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine

      - name: "Download: wheel"
        uses: actions/download-artifact@v3
        with:
          path: dist

      - name: "Publish: Wheel"
        uses: pypa/gh-action-pypi-publish@v1.5.1
        with:
          packages_dir: dist/*/
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}